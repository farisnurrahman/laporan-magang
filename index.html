<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Faris Nurrahman">
    <meta name="description" content="Official Internship Report Preview Portal">
    <meta name="robots" content="noarchive, nosnippet, noindex, nofollow">
    
    <title>Official Internship Report Preview Portal</title>
    <link rel="stylesheet" href="gaya.css">

    <script>
        // === PROTEKSI FORENSIK DIGITAL KETAT ===
        document.addEventListener("contextmenu", e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode === 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) return false;
            if (e.ctrlKey && e.keyCode === 85) return false;
            if (e.ctrlKey && e.keyCode === 80) return false;
            if (e.ctrlKey && e.keyCode === 83) return false;
        };

        // === KONFIGURASI DETEKSI OTOMATIS GLOBAL ===
        const USERNAME = "farisnurrahman";
        const REPOSITORI = "laporan-magang";
        const DAFTAR_FOLDER = ["1_Draft_Awal", "2_Revisi_Pembimbing", "3_Naskah_Final"];

        async function bangunLingkunganDinamis() {
            const sidebar = document.getElementById("js-sidebar-menu");
            sidebar.innerHTML = "<p class='c-loader'>Memindai Lini Masa Dokumen...</p>";

            try {
                let htmlNavigasi = "";

                for (const folder of DAFTAR_FOLDER) {
                    // Membaca struktur berkas menggunakan endpoint CDN publik yang anti-blokir rate-limit
                    const respon = await fetch(`https://github.com{USERNAME}/${REPOSITORI}/contents/${folder}?v=${new Date().getTime()}`);
                    
                    if (!respon.ok) continue;
                    const daftarBerkas = await respon.json();

                    // Otomatis menyaring HANYA berkas berformat PDF tanpa peduli apa pun namanya (Bebas NIM!)
                    const berkasPdf = daftarBerkas.filter(file => file.name.toLowerCase().endsWith('.pdf'));

                    if (berkasPdf.length > 0) {
                        // Membuat judul bagian otomatis berdasarkan nama folder di GitHub
                        const judulBagian = folder.replace(/^\d+_/,'').replace(/_/g, ' ').toUpperCase();
                        htmlNavigasi += `<div class="c-sidebar__section"><h3>${judulBagian}</h3>`;
                        
                        berkasPdf.forEach(pdf => {
                            // Bersihkan tampilan nama tombol (menghilangkan ekstensi .pdf agar visual di dosen rapi)
                            const labelTombol = pdf.name.replace(/\.[^/.]+$/, "").replace(/_/g, " ");
                            // Gunakan githack untuk render file PDF bersih terproteksi tanpa interface kode GitHub
                            const urlRenderBersih = `https://githack.com{USERNAME}/${REPOSITORI}/main/${pdf.path}`;
                            
                            htmlNavigasi += `
                                <button class="c-sidebar__btn" onclick="tampilkanDokumen('${urlRenderBersih}', this)">
                                    ${labelTombol}
                                </button>`;
                        });
                        
                        htmlNavigasi += `</div>`;
                    }
                }

                sidebar.innerHTML = htmlNavigasi || "<p class='c-loader'>Lingkungan Siap. Silakan unggah dokumen PDF ber-NIM Anda ke dalam folder bimbingan di GitHub.</p>";
                
                // Otomatis klik dokumen pertama yang berhasil ditemukan agar langsung tampil di dosen
                const tombolPertama = sidebar.querySelector('.c-sidebar__btn');
                if (tombolPertama) tombolPertama.click();

            } catch (error) {
                sidebar.innerHTML = "<p class='c-loader--error'>Gagal memproses data lingkungan secara dinamis.</p>";
            }
        }

        function tampilkanDokumen(url, elemenTombol) {
            document.querySelectorAll('.c-sidebar__btn').forEach(btn => btn.classList.remove('is-active'));
            elemenTombol.classList.add('is-active');

            const penampil = document.getElementById("js-pdf-viewer");
            penampil.src = url + "#toolbar=0&navpanes=0&scrollbar=0";
        }

        window.addEventListener("DOMContentLoaded", bangunLingkunganDinamis);
    </script>
</head>
<body>

<header class="c-header">
    
        <h1 class="c-header__title">OFFICIAL INTERNSHIP REPORT PORTAL</h1>
        <p class="c-header__copyright">Copyright © 2026 • Faris Nurrahman</p>
    </div>
    <div class="c-header__status">
        <span class="c-security-badge">Dynamic API Protections</span>
    </div>
</header>

<div class="l-workspace">
    <!-- Menu Samping Otomatis Terisi Berdasarkan File Aktual di GitHub -->
    <nav class="c-sidebar" id="js-sidebar-menu"></nav>
    
    <!-- Area Render Penampil PDF Utama -->
    <main class="l-document">
        <iframe id="js-pdf-viewer" class="c-pdf-viewer" src="about:blank"></iframe>
    </main>
</div>

<footer class="c-footer">
    Protected under Indonesian Copyright Law No.28/2014 • Adaptive Environmental Architecture
</footer>

</body>
</html>
