<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Faris Nurrahman">
    <meta name="description" content="Official Internship Report Preview Portal">
    <meta name="robots" content="noarchive, nosnippet, noindex, nofollow">
    
    <title>Official Internship Report Preview Portal</title>
    <link rel="stylesheet" href="gaya.css">

    <script>
        // Perlindungan Keamanan Forensik Ketat
        document.addEventListener("contextmenu", e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode === 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) return false;
            if (e.ctrlKey && e.keyCode === 85) return false;
            if (e.ctrlKey && e.keyCode === 80) return false;
            if (e.ctrlKey && e.keyCode === 83) return false;
        };

        // Membaca Basis Data Lokal Secara Fleksibel & Aman
        async function muatStrukturLingkungan() {
            const sidebar = document.getElementById("js-sidebar-menu");
            sidebar.innerHTML = "<p class='c-loader'>Sinkronisasi metadata lokal...</p>";

            try {
                // Membaca manifest data.json tanpa hambatan CORS/Rate Limit API
                const respon = await fetch('data.json?v=' + new Date().getTime());
                const strukturData = await respon.json();
                
                let htmlMenu = "";

                // Melakukan perulangan otomatis membentuk komponen navigasi
                for (const kunci dalam strukturData) {
                    const grup = strukturData[kunci];
                    if (grup.berkas && grup.berkas.length > 0) {
                        htmlMenu += `<div class="c-sidebar__section"><h3>${grup.judul}</h3>`;
                        
                        grup.berkas.forEach(item => {
                            // Menggunakan ://githack.com agar PDF tampil bersih tanpa frame kode GitHub
                            const urlClean = `https://://githack.com/farisnurrahman/laporan-magang/main/${item.path}`;
                            
                            htmlMenu += `
                                <button class="c-sidebar__btn" onclick="tampilkanPdf('${urlClean}', this)">
                                    ${item.nama}
                                </button>`;
                        });
                        
                        htmlMenu += `</div>`;
                    }
                }

                sidebar.innerHTML = htmlMenu;

                // Otomatis aktifkan dokumen pertama di daftar menu
                const tombolPertama = sidebar.querySelector('.c-sidebar__btn');
                if (tombolPertama) tombolPertama.click();

            } catch (error) {
                sidebar.innerHTML = "<p class='c-loader--error'>Gagal memproses basis data lingkungan.</p>";
            }
        }

        function tampilkanPdf(url, elemenTombol) {
            document.querySelectorAll('.c-sidebar__btn').forEach(btn => btn.classList.remove('is-active'));
            elemenTombol.classList.add('is-active');

            const viewer = document.getElementById("js-pdf-viewer");
            viewer.src = url + "#toolbar=0&navpanes=0&scrollbar=0";
        }

        window.addEventListener("DOMContentLoaded", muatStrukturLingkungan);
    </script>
</head>
<body>

<header class="c-header">
    
        <h1 class="c-header__title">OFFICIAL INTERNSHIP REPORT PORTAL</h1>
        <p class="c-header__copyright">Copyright © 2026 • Faris Nurrahman</p>
    </div>
    <div class="c-header__status">
        <span class="c-security-badge">Decoupled Manifest Protection</span>
    </div>
</header>

<div class="l-workspace">
    <nav class="c-sidebar" id="js-sidebar-menu"></nav>
    <main class="l-document">
        <iframe id="js-pdf-viewer" class="c-pdf-viewer" src="about:blank"></iframe>
    </main>
</div>

<footer class="c-footer">
    Protected under Indonesian Copyright Law No.28/2014 • Fixed Manifest Architecture
</footer>

</body>
</html>
